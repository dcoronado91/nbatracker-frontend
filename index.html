<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NBA Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>

    <header class="site-header">
      <div class="header-inner">
        <div class="header-brand">
          <span class="brand-icon">🏀</span>
          <div>
            <h1 class="brand-title">NBA Tracker</h1>
            <p class="brand-sub">Estadísticas de jugadores</p>
          </div>
        </div>
      </div>
    </header>

    <main class="layout">

      <aside class="sidebar">
        <div class="form-card" id="form-card">
          <h2 id="form-title">Agregar jugador</h2>
          <form id="player-form" novalidate>

            <div class="form-group">
              <label for="name">Nombre</label>
              <input type="text" id="name" placeholder="LeBron James" required autocomplete="off" />
              <span class="field-error" id="name-error"></span>
            </div>

            <div class="form-group">
              <label for="team">Equipo</label>
              <input type="text" id="team" placeholder="Los Angeles Lakers" required autocomplete="off" />
              <span class="field-error" id="team-error"></span>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="championships">Campeonatos</label>
                <input type="number" id="championships" placeholder="0" min="0" />
              </div>
              <div class="form-group">
                <label for="mvp">MVPs</label>
                <input type="number" id="mvp" placeholder="0" min="0" />
              </div>
            </div>

            <div class="form-actions">
              <button type="submit" id="submit-btn" class="btn btn-primary">Crear jugador</button>
              <button type="button" id="cancel-btn" class="btn btn-ghost" style="display:none;">Cancelar</button>
            </div>

          </form>
        </div>
      </aside>

      <section class="content">
        <div class="content-header">
          <h2 class="content-title">
            Jugadores
            <span class="badge" id="player-count">0</span>
          </h2>
        </div>
        <div id="app"></div>
      </section>

    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
